specificationVersion: 'jobtemplate-2023-09'
name: '{{Param.JobName}}'
description: |
  This is a test job for step-step dependencies with job attachments data
  being produced in each step of the chain. This job makes assertions about
  the data it sees, which will be wrong if the output manifest files get
  layered in the wrong order.
parameterDefinitions:
- name: JobName
  type: STRING
  default: Step-Step Chain JA Output Test
- name: OutputPath
  type: PATH
  objectType: DIRECTORY
  dataFlow: OUT
  default: output
- name: JobScriptDir
  description: Directory containing embedded scripts
  userInterface:
    control: HIDDEN
  type: PATH
  objectType: DIRECTORY
  dataFlow: IN
  default: scripts
steps:
- name: A
  script:
    actions:
      onRun:
        command: bash
        args: ['{{Param.JobScriptDir}}/create_files.sh', '{{Param.OutputPath}}', 'A', 'A', 'Z']
- name: B
  dependencies:
  - dependsOn: A
  script:
    actions:
      onRun:
        command: bash
        args: ['{{Param.JobScriptDir}}/create_files.sh', '{{Param.OutputPath}}', 'A', 'B', 'Z']
- name: C
