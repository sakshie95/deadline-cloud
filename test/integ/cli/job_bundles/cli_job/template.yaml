specificationVersion: 'jobtemplate-2023-09'
name: cli_job
description: Flexible job template that accepts custom bash script
parameterDefinitions:
  - name: DataDir
    type: PATH
    objectType: DIRECTORY
    dataFlow: INOUT
    description: Directory for input and output data
  - name: BashScript
    type: STRING
    description: Custom bash script to execute
    default: |
      #!/bin/bash
      echo "Default CLI job script"
      mkdir -p "$DATA_DIR"
      echo "Default output" > "$DATA_DIR/default_output.txt"
jobEnvironments:
  - name: default
    script:
      actions:
        onEnter:
          command: env
steps:
  - name: Execute
    parameterSpace:
      taskParameterDefinitions:
        - name: Task
          type: INT
          range: "1"
    script:
      actions:
        onRun:
          command: '{{Task.File.run}}'
      embeddedFiles:
        - name: run
          filename: run.sh
          type: TEXT
          runnable: true
          data: |
            #!/bin/bash
            set -euo pipefail
            echo "Executing custom CLI job script"
            
            # Find the asset root directory where job attachments expects files to be created
            ASSET_ROOT=$(find . -name "assetroot-*" -type d 2>/dev/null | head -1)
            if [ -n "$ASSET_ROOT" ]; then
                export DATA_DIR="$ASSET_ROOT"
                echo "Using asset root directory: $ASSET_ROOT"
            else
                # Create the asset root directory if it doesn't exist
                # The pattern seems to be assetroot-<hash>
                ASSET_ROOT="./assetroot-$(date +%s | md5sum | cut -c1-20)"
                mkdir -p "$ASSET_ROOT"
                export DATA_DIR="$ASSET_ROOT"
                echo "Created asset root directory: $ASSET_ROOT"
            fi
            
            # Create a temporary script file with the custom bash script
            cat > /tmp/custom_script.sh << 'EOF'
            {{Param.BashScript}}
            EOF
            
            chmod +x /tmp/custom_script.sh
            /tmp/custom_script.sh
            
            echo "Custom CLI job script completed"