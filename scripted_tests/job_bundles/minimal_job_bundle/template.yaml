specificationVersion: 'jobtemplate-2023-09'
name: Minimal Sleep Job
description: A minimal job that sleeps for 10 seconds

steps:
- name: SleepTask
  hostRequirements:
    attributes:
    - name: attr.worker.os.family
      anyOf:
      - linux
  script:
    actions:
      onRun:
        command: bash
        args: ['{{Task.File.SleepScript}}']
    embeddedFiles:
    - name: SleepScript
      type: TEXT
      data: |
        #!/bin/bash
        set -euo pipefail
        
        echo "Starting minimal job..."
        sleep 10
        echo "Job completed successfully"
