name: Code Quality

on:
  pull_request:
    branches: [ mainline, release, feature_assets_cli ]
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
      tag:
        required: false
        type: string

jobs:
  Test:
    name: Python
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    uses: aws-deadline/.github/.github/workflows/reusable_python_build.yml@mainline
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      ref: ${{inputs.tag}}

  TestPy38:
    name: Python
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8']
    uses: ./.github/workflows/reusable_python_build_coverage_override.yml
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      ref: ${{inputs.tag}}
      # The incremental output download feature doesn't run on Python 3.8, so test coverage is lower
      cov-fail-under: "75"
