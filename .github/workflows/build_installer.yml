name: "Deadline Cloud Client Build Installer"

on:
  workflow_dispatch:
    inputs:
      os:
        required: true
        default: "linux"
        type: choice
        options:
        - Linux
        - Windows
        - MacOS
      ref_type:
        required: true
        type: choice
        options:
        - heads
        - tags
      ref:
        required: true
        type: string
        default: "mainline"
      environment:
        required: true
        type: choice
        options:
        - mainline

jobs:
  BuildDeadlineCloudClientInstaller:
    if: (github.repository == 'aws-deadline/deadline-cloud')
    name: Build Deadline Cloud Client Installer
    uses: aws-deadline/.github/.github/workflows/reusable_build_installers.yml@mainline
    secrets: inherit
    permissions:
      id-token: write
      contents: read
    with:
      environment: ${{inputs.environment}}
      ref_type: ${{inputs.ref_type}}
      ref: ${{inputs.ref}}
      oses: "['${{inputs.os}}']"
      project_name: "deadline-cloud"
